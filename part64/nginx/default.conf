map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

server {
    listen 80;
    server_name _;

    resolver 127.0.0.11 ipv6=off valid=10s;

    set $world_backend "eta-mu-system:8787";
    set $weaver_backend "eta-mu-system:8793";

    client_max_body_size 64m;
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65s;
    keepalive_requests 2000;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_types
        application/json
        application/javascript
        text/css
        text/plain
        application/xml
        text/xml
        image/svg+xml;

    proxy_http_version 1.1;
    proxy_connect_timeout 8s;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_next_upstream error timeout invalid_header http_502 http_503 http_504;
    proxy_next_upstream_tries 2;

    location /ws {
        proxy_pass http://$world_backend/ws$is_args$args;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }

    location ~ ^/sim/([a-zA-Z0-9._-]+)/weaver/(.*)$ {
        set $sim_id $1;
        set $sim_tail $2;
        proxy_pass http://$sim_id:8793/$sim_tail$is_args$args;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }

    location ~ ^/sim/([a-zA-Z0-9._-]+)(/.*)?$ {
        set $sim_id $1;
        set $sim_path $2;
        if ($sim_path = "") {
            set $sim_path "/";
        }
        proxy_pass http://$sim_id:8787$sim_path$is_args$args;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }

    location /weaver/ {
        proxy_pass http://$weaver_backend/;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }

    location = /api/catalog {
        proxy_pass http://$world_backend;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_buffering off;
        proxy_request_buffering off;
        gzip off;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }

    location = /api/catalog/stream {
        proxy_pass http://$world_backend;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_buffering off;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }

    location ^~ /api/ {
        proxy_pass http://$world_backend;
        proxy_read_timeout 180s;
        proxy_send_timeout 180s;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }

    location / {
        proxy_pass http://$world_backend;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }
}
